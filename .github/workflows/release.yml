name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build DMG and Publish Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build DMG
        run: make dmg

      - name: Verify DMG
        run: hdiutil verify dist/Breathlet.dmg

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/Breathlet.dmg --clobber
          else
            gh release create "$TAG_NAME" dist/Breathlet.dmg \
              --title "$TAG_NAME" \
              --generate-notes
          fi
